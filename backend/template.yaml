AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: QuizzApp backend — AI-powered quiz generation for AWS certifications

# ── Globals ────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        BEDROCK_REGION: !Ref BedrockRegion
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        QDRANT_URL: !Ref QdrantUrl
        QDRANT_API_KEY: !Ref QdrantApiKey
        HISTORY_TABLE: !Ref QuizHistoryTable
        SUBSCRIPTIONS_TABLE: !Ref QuizSubscriptionsTable

# ── Parameters ─────────────────────────────────────────────────────────────
Parameters:
  BedrockRegion:
    Type: String
    Default: us-east-1

  BedrockModelId:
    Type: String
    Default: amazon.nova-pro-v1:0

  QdrantUrl:
    Type: String
    Default: ""

  QdrantApiKey:
    Type: String
    Default: ""
    NoEcho: true

  StripeSecretKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Stripe secret key (sk_live_... or sk_test_...).

  StripeWebhookSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Stripe webhook signing secret (whsec_...).

  StripePriceId:
    Type: String
    Default: ""
    Description: Stripe Price ID for the monthly subscription plan.

  FrontendUrl:
    Type: String
    Default: "https://quizzapp-six-cyan.vercel.app"
    Description: Frontend base URL for Stripe redirect URLs.

# ── Resources ──────────────────────────────────────────────────────────────
Resources:

  # ── Auth ──────────────────────────────────────────────────────────────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: quizzapp-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: quizzapp-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  # ── API ───────────────────────────────────────────────────────────────────
  QuizApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      Auth:
        DefaultAuthorizer: CognitoJwtAuth
        Authorizers:
          CognitoJwtAuth:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
              audience:
                - !Ref UserPoolClient
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - Stripe-Signature

  # ── DynamoDB ──────────────────────────────────────────────────────────────
  QuizHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: quizzapp-history
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: quizId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: quizId
          KeyType: RANGE

  QuizSubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: quizzapp-subscriptions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: sortKey
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: sortKey
          KeyType: RANGE

  # ── IAM Policies ──────────────────────────────────────────────────────────
  DynamoDBPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Allow Lambda functions to read/write quiz history in DynamoDB
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:Query
              - dynamodb:GetItem
            Resource: !GetAtt QuizHistoryTable.Arn

  SubscriptionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Allow Lambda functions to access the subscriptions table
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
            Resource: !GetAtt QuizSubscriptionsTable.Arn

  BedrockInvokePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Allow Lambda functions to invoke Amazon Bedrock foundation models
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource:
              - !Sub arn:aws:bedrock:${BedrockRegion}::foundation-model/*
              - !Sub arn:aws:bedrock:*::foundation-model/*
              - arn:aws:bedrock:*:*:inference-profile/*
              - arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-embed-text-v2:0
          - Effect: Allow
            Action:
              - aws-marketplace:ViewSubscriptions
              - aws-marketplace:Subscribe
              - aws-marketplace:Unsubscribe
            Resource: "*"

  # ── Lambda Functions ───────────────────────────────────────────────────────

  # 1 — generate question (with quota check)
  GenerateQuestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quizzapp-generate-question
      Handler: handler.lambda_handler
      CodeUri: functions/generate_question/
      Description: Generates an AWS certification question via Bedrock with daily quota enforcement
      Policies:
        - !Ref BedrockInvokePolicy
        - !Ref SubscriptionPolicy
      Events:
        Generate:
          Type: HttpApi
          Properties:
            ApiId: !Ref QuizApi
            Path: /generate-question
            Method: post

  # 2 — evaluate answer
  EvaluateAnswerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quizzapp-evaluate-answer
      Handler: handler.lambda_handler
      CodeUri: functions/evaluate_answer/
      Description: Evaluates an answer and returns personalized Bedrock feedback
      Policies:
        - !Ref BedrockInvokePolicy
      Events:
        Evaluate:
          Type: HttpApi
          Properties:
            ApiId: !Ref QuizApi
            Path: /evaluate-answer
            Method: post

  # 3 — save quiz + increment daily quota
  SaveQuizFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quizzapp-save-quiz
      Handler: handler.lambda_handler
      CodeUri: functions/save_quiz/
      Description: Saves quiz result to DynamoDB history and increments daily quota counter
      Policies:
        - !Ref DynamoDBPolicy
        - !Ref SubscriptionPolicy
      Events:
        Save:
          Type: HttpApi
          Properties:
            ApiId: !Ref QuizApi
            Path: /save-quiz
            Method: post

  # 4 — list history
  ListHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quizzapp-list-history
      Handler: handler.lambda_handler
      CodeUri: functions/list_history/
      Description: Returns quiz history for the authenticated user from DynamoDB
      Policies:
        - !Ref DynamoDBPolicy
      Events:
        List:
          Type: HttpApi
          Properties:
            ApiId: !Ref QuizApi
            Path: /history
            Method: get

  # 5 — generate summary
  GenerateSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quizzapp-generate-summary
      Handler: handler.lambda_handler
      CodeUri: functions/generate_summary/
      Description: Generates a personalized study plan based on quiz performance
      Policies:
        - !Ref BedrockInvokePolicy
      Events:
        Summary:
          Type: HttpApi
          Properties:
            ApiId: !Ref QuizApi
            Path: /generate-summary
            Method: post

  # 6 — get subscription status + daily quota
  GetSubscriptionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quizzapp-get-subscription
      Handler: handler.lambda_handler
      CodeUri: functions/get_subscription/
      Description: Returns current subscription plan and daily quiz quota for the user
      Policies:
        - !Ref SubscriptionPolicy
      Events:
        GetSub:
          Type: HttpApi
          Properties:
            ApiId: !Ref QuizApi
            Path: /subscription
            Method: get

  # 7 — create Stripe Checkout session
  CreateCheckoutSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quizzapp-create-checkout-session
      Handler: handler.lambda_handler
      CodeUri: functions/create_checkout_session/
      Description: Creates a Stripe Checkout session for monthly subscription upgrade
      Policies:
        - !Ref SubscriptionPolicy
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_PRICE_ID: !Ref StripePriceId
          FRONTEND_URL: !Ref FrontendUrl
      Events:
        Checkout:
          Type: HttpApi
          Properties:
            ApiId: !Ref QuizApi
            Path: /create-checkout-session
            Method: post

  # 8 — Stripe webhook (public — no Cognito auth)
  StripeWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quizzapp-stripe-webhook
      Handler: handler.lambda_handler
      CodeUri: functions/stripe_webhook/
      Description: Receives Stripe webhook events and updates subscription status in DynamoDB
      Policies:
        - !Ref SubscriptionPolicy
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
      Events:
        Webhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref QuizApi
            Path: /stripe-webhook
            Method: post
            Auth:
              Authorizer: NONE

# ── Outputs ────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: HTTP API base URL — set as VITE_API_URL in .env.local
    Value: !Sub https://${QuizApi}.execute-api.${AWS::Region}.amazonaws.com
    Export:
      Name: QuizzAppApiUrl

  UserPoolId:
    Description: Cognito User Pool ID — set as VITE_COGNITO_USER_POOL_ID in .env.local
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito App Client ID — set as VITE_COGNITO_CLIENT_ID in .env.local
    Value: !Ref UserPoolClient

  StripeWebhookUrl:
    Description: Register this URL as a Stripe webhook endpoint in your Stripe Dashboard
    Value: !Sub https://${QuizApi}.execute-api.${AWS::Region}.amazonaws.com/prod/stripe-webhook
